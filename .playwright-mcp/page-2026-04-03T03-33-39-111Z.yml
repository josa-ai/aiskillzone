        - heading "The Story of Lago Dos Bocas" [level=3] [ref=e106]
        - paragraph [ref=e107]: Lago Dos Bocas reservoir was completed in 1942 in the beautiful mountains of Utuado, Puerto Rico. Located at the confluence of the Río Grande de Arecibo and the Río Caonillas, this stunning lake surrounded by lush green mountains is our inspiration. Just as the lake brings together two rivers, we bring together authentic Puerto Rican flavors and warm hospitality to create an unforgettable dining experience.
